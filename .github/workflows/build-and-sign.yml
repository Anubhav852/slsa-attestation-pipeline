name: Secure Build and Cryptographic Artifact Attestation

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-attest:
    name: Execute Hardened Compilation & Keyless OIDC Signing
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    outputs:
      image: ${{ env.REGISTRY }}/${{ sig-info.outputs.lowercased_image }}
      digest: ${{ steps.build-and-push.outputs.digest }}

    steps:
      - name: Checkout Source Repository Code Plane
        uses: actions/checkout@v4

      - name: Install Sigstore Cosign Ecosystem Binary
        uses: sigstore/cosign-installer@v3.5.0

      - name: Set up Docker Buildx Compilation Engine
        uses: docker/setup-buildx-action@v3

      - name: Inject Hardened Lowercase Environment Variables
        id: sig-info
        run: |
          REPO_LOWER=$(echo "${{ github.repository }}" | tr '[:upper:]' '[:lower:]')
          echo "IMAGE_NAME=${REPO_LOWER}" >> $GITHUB_ENV
          echo "lowercased_image=${REPO_LOWER}" >> $GITHUB_OUTPUT

      - name: Authenticate with GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Dynamic Image Metadata (Tags/Labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=sha256-

      - name: Build and Publish Hardened Container Image Digest
        id: build-and-push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inject Cryptographic Keyless Identity Attestation
        env:
          DIGEST: ${{ steps.build-and-push.outputs.digest }}
        run: |
          echo "Initiating Zero-Trust cryptographic identity execution flow..."
          cosign sign --yes "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@${{ env.DIGEST }}"

  # =========================================================================
  # Isolated Google SLSA Level 3 Provenance Manifest Generation
  # =========================================================================
  provenance:
    needs: [build-and-attest]
    permissions:
      actions: read
      id-token: write
      packages: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_container_slsa3.yml@v2.0.0
    with:
      image: ${{ needs.build-and-attest.outputs.image }}
      digest: ${{ needs.build-and-attest.outputs.digest }}
      registry-username: ${{ github.actor }}
    secrets:
      registry-password: ${{ secrets.GITHUB_TOKEN }}